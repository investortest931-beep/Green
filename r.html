<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Referrals | Green Naira</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #020617; color: white; padding: 24px; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .shimmer { background: linear-gradient(90deg, rgba(255,255,255,0) 0%, rgba(255,255,255,0.05) 50%, rgba(255,255,255,0) 100%); background-size: 200% 100%; animation: shimmer 1.5s infinite; }
        @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
    </style>
</head>
<body class="max-w-md mx-auto">

    <!-- HEADER -->
    <header class="flex items-center space-x-4 mb-8">
        <a href="dashboard.html" class="w-10 h-10 glass rounded-full flex items-center justify-center text-slate-400">
            <i class="fas fa-arrow-left"></i>
        </a>
        <h1 class="text-xl font-bold">Referrals</h1>
    </header>

    <!-- REFERRAL LINK BOX -->
    <div class="glass p-6 rounded-[32px] mb-8">
        <label class="block text-[10px] font-black uppercase tracking-widest text-slate-500 mb-3 ml-1">Your Referral Link</label>
        <div class="relative">
            <input type="text" id="refLink" readonly class="w-full bg-white/5 border border-white/10 rounded-2xl py-4 pl-5 pr-24 text-sm font-medium text-emerald-400 focus:outline-none">
            <button onclick="copyLink()" id="copyBtn" class="absolute right-2 top-2 bottom-2 bg-emerald-600 px-4 rounded-xl text-[10px] font-black uppercase tracking-tighter hover:bg-emerald-500 transition active:scale-95">
                Copy
            </button>
        </div>
        <p class="text-[10px] text-slate-500 mt-3 italic">Earn ₦1,500 bonus when your friend makes their first deposit.</p>
    </div>

    <!-- REFERRAL LIST -->
    <div class="space-y-4">
        <h3 class="text-xs font-black uppercase tracking-widest text-slate-400 ml-1 mb-4">Your Referral List</h3>
        <div id="refList" class="space-y-3">
            <!-- Loading Skeletons -->
            <div class="shimmer glass h-16 rounded-2xl w-full"></div>
            <div class="shimmer glass h-16 rounded-2xl w-full"></div>
        </div>
    </div>

    <script>
        const scriptURL = 'https://script.google.com/macros/s/AKfycbxharLFsBQYjMkbTq0WG8S_l3qkA7-0G4WmXj7bMq4ElyFdYJj-uvMFRY4GLst7NT6U/exec';
        const session = JSON.parse(localStorage.getItem('greennaira_session'));

        if (!session) window.location.href = 'login.html';

        // Set Link
        const fullRefLink = `${window.location.origin}/signup.html?ref=${session.referralCode}`;
        document.getElementById('refLink').value = fullRefLink;

        async function loadReferralData() {
            const list = document.getElementById('refList');
            
            try {
                const response = await fetch(`${scriptURL}?userId=${session.userId}`);
                const data = await response.json();
                
                list.innerHTML = '';

                if (!data.referrals || data.referrals.length === 0) {
                    list.innerHTML = `
                        <div class="glass p-12 rounded-3xl text-center border-dashed border-white/10">
                            <i class="fas fa-users-slash text-slate-800 text-3xl mb-3"></i>
                            <p class="text-slate-500 text-xs font-bold uppercase tracking-widest">No referrals yet</p>
                        </div>
                    `;
                    return;
                }

                data.referrals.forEach(ref => {
                    const statusColor = ref.status === 'Paid' ? 'text-emerald-500' : 'text-amber-500';
                    const iconBg = ref.status === 'Paid' ? 'bg-emerald-600' : 'bg-slate-800';
                    
                    list.innerHTML += `
                        <div class="glass p-4 rounded-2xl flex items-center justify-between">
                            <div class="flex items-center space-x-3">
                                <div class="w-10 h-10 rounded-full ${iconBg} flex items-center justify-center text-xs font-bold text-white uppercase">
                                    ${ref.name.charAt(0)}
                                </div>
                                <div>
                                    <h4 class="text-xs font-bold text-white">${ref.name}</h4>
                                    <p class="text-[9px] text-slate-500 uppercase font-black">${ref.date}</p>
                                </div>
                            </div>
                            <div class="text-right">
                                <span class="text-[9px] font-black uppercase ${statusColor}">
                                    ${ref.status}
                                </span>
                            </div>
                        </div>
                    `;
                });

            } catch (err) {
                list.innerHTML = `<p class="text-center text-red-500 text-xs py-4">Failed to load data.</p>`;
            }
        }

        function copyLink() {
            const copyText = document.getElementById("refLink");
            copyText.select();
            document.execCommand("copy");
            const btn = document.getElementById('copyBtn');
            btn.innerText = "Copied!";
            setTimeout(() => btn.innerText = "Copy", 2000);
        }

        loadReferralData();
    </script>
</body>
</html>
