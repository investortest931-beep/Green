<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crash AI - Simple</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- TensorFlow.js -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>

    <style>
        body { background-color: #0f172a; color: #f8fafc; font-family: system-ui, -apple-system, sans-serif; }
        .crash-bubble { display: inline-flex; align-items: center; justify-content: center; padding: 4px 10px; border-radius: 9999px; font-weight: bold; font-size: 0.875rem; margin-right: 6px; margin-bottom: 6px; }
        .bg-low { background-color: rgba(239, 68, 68, 0.2); color: #ef4444; }
        .bg-med { background-color: rgba(234, 179, 8, 0.2); color: #eab308; }
        .bg-high { background-color: rgba(34, 197, 94, 0.2); color: #22c55e; }
        
        /* Smooth progress bar */
        #train-progress { transition: width 0.3s ease; }
    </style>
</head>
<body class="min-h-screen p-4 md:p-8 flex justify-center">

    <div class="max-w-3xl w-full space-y-6">
        
        <!-- Header -->
        <header class="text-center mb-8">
            <h1 class="text-3xl font-bold text-white">Crash AI <span class="text-blue-500">Lite</span></h1>
            <p class="text-slate-400 text-sm mt-1">Simple Neural Network Predictor</p>
        </header>

        <!-- Prediction Result Card (The Focus) -->
        <div class="bg-slate-800 rounded-2xl p-6 text-center border border-slate-700 shadow-lg">
            <h2 class="text-slate-400 text-sm font-semibold uppercase tracking-wider mb-2">AI Prediction (Next Round > 2x)</h2>
            <div class="flex flex-col items-center justify-center gap-2">
                <div id="signal-text" class="text-4xl font-black text-slate-500">WAITING...</div>
                <div id="prob-text" class="text-2xl font-medium text-slate-300">--%</div>
            </div>
        </div>

        <!-- Controls & Data Input -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <!-- Add Data -->
            <div class="bg-slate-800 p-5 rounded-2xl border border-slate-700">
                <label class="block text-slate-400 text-sm mb-2 font-medium">Add Crash Multiplier</label>
                <div class="flex gap-2">
                    <input type="number" id="crash-input" step="0.01" min="1.00" placeholder="e.g. 2.50" 
                        class="w-full bg-slate-900 border border-slate-600 rounded-lg px-4 py-2 text-white focus:outline-none focus:border-blue-500">
                    <button onclick="handleAdd()" class="bg-blue-600 hover:bg-blue-500 px-4 py-2 rounded-lg font-bold transition-colors">Add</button>
                </div>
                <button onclick="simCrash()" class="w-full mt-3 bg-slate-700 hover:bg-slate-600 text-sm py-2 rounded-lg transition-colors">
                    + Generate Random Crash
                </button>
            </div>

            <!-- AI Actions -->
            <div class="bg-slate-800 p-5 rounded-2xl border border-slate-700 flex flex-col justify-between">
                <div>
                    <div class="flex justify-between text-sm mb-2">
                        <span class="text-slate-400">Total Records: <span id="data-count" class="text-white font-bold">0</span></span>
                        <span id="model-status" class="text-yellow-500 font-bold">Untrained</span>
                    </div>
                    <!-- Progress Bar -->
                    <div class="w-full bg-slate-900 h-2 rounded-full overflow-hidden mb-3">
                        <div id="train-progress" class="h-full bg-blue-500 w-0"></div>
                    </div>
                </div>
                <div class="flex gap-2">
                    <button id="btn-train" onclick="trainAI()" class="flex-1 bg-indigo-600 hover:bg-indigo-500 py-2 rounded-lg font-bold transition-colors">
                        Train AI
                    </button>
                    <button id="btn-predict" onclick="predict()" class="flex-1 bg-green-600 hover:bg-green-500 py-2 rounded-lg font-bold transition-colors">
                        Predict
                    </button>
                </div>
            </div>
        </div>

        <!-- Chart Section -->
        <div class="bg-slate-800 p-5 rounded-2xl border border-slate-700">
            <h3 class="text-slate-400 text-sm font-semibold mb-4">Recent Trend (Last 30)</h3>
            <div class="h-48 w-full">
                <canvas id="chart"></canvas>
            </div>
        </div>

        <!-- History List -->
        <div class="bg-slate-800 p-5 rounded-2xl border border-slate-700">
            <div class="flex justify-between items-center mb-4">
                <h3 class="text-slate-400 text-sm font-semibold">History Tape</h3>
                <button onclick="clearData()" class="text-xs text-red-400 hover:text-red-300 underline">Clear Data</button>
            </div>
            <div id="history-list" class="flex flex-wrap">
                <!-- Bubbles go here -->
            </div>
        </div>

    </div>

    <script>
        // 1. State
        let crashData = [];
        let model = null;
        let chartInstance = null;
        const WINDOW_SIZE = 5;

        // 2. Initialization & Storage
        window.onload = () => {
            const saved = localStorage.getItem('crashData');
            if (saved) {
                try { crashData = JSON.parse(saved); } catch(e) { crashData = []; }
            }
            if(crashData.length === 0) {
                // Seed data
                crashData = [1.2, 2.5, 1.1, 4.2, 1.3, 8.4, 1.05, 1.8, 2.1, 1.1, 1.5, 3.2];
                saveData();
            }
            updateUI();
        };

        function saveData() {
            if(crashData.length > 2000) crashData = crashData.slice(-2000); // limit size
            localStorage.setItem('crashData', JSON.stringify(crashData));
        }

        function clearData() {
            if(confirm("Delete all history?")) {
                crashData = [];
                model = null;
                document.getElementById('model-status').textContent = "Untrained";
                document.getElementById('model-status').className = "text-yellow-500 font-bold";
                saveData();
                updateUI();
                resetPredictionUI();
            }
        }

        // 3. UI Updates
        function updateUI() {
            document.getElementById('data-count').textContent = crashData.length;
            renderHistory();
            renderChart();
        }

        function getStyleClass(val) {
            if (val < 1.5) return 'bg-low';
            if (val < 2.0) return 'bg-med';
            return 'bg-high';
        }

        function renderHistory() {
            const container = document.getElementById('history-list');
            container.innerHTML = '';
            // Show last 20
            const recent = crashData.slice(-20).reverse();
            recent.forEach(val => {
                const span = document.createElement('span');
                span.className = `crash-bubble ${getStyleClass(val)}`;
                span.textContent = val.toFixed(2) + 'x';
                container.appendChild(span);
            });
        }

        function renderChart() {
            const ctx = document.getElementById('chart').getContext('2d');
            const recent = crashData.slice(-30);
            const labels = recent.map((_, i) => i + 1);

            if (chartInstance) {
                chartInstance.data.labels = labels;
                chartInstance.data.datasets[0].data = recent;
                chartInstance.update();
                return;
            }

            chartInstance = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Multiplier',
                        data: recent,
                        borderColor: '#3b82f6',
                        borderWidth: 2,
                        pointBackgroundColor: recent.map(v => v >= 2 ? '#22c55e' : '#ef4444'),
                        tension: 0.2
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        x: { display: false },
                        y: { 
                            type: 'logarithmic',
                            grid: { color: '#334155' }, 
                            ticks: { color: '#94a3b8', callback: v => v + 'x' }
                        }
                    }
                }
            });
        }

        function resetPredictionUI() {
            document.getElementById('signal-text').textContent = "WAITING...";
            document.getElementById('signal-text').className = "text-4xl font-black text-slate-500";
            document.getElementById('prob-text').textContent = "--%";
        }

        // 4. Data Input
        function handleAdd() {
            const input = document.getElementById('crash-input');
            const val = parseFloat(input.value);
            if (!isNaN(val) && val >= 1) {
                crashData.push(val);
                saveData();
                updateUI();
                input.value = '';
            }
        }

        function simCrash() {
            const r = Math.random();
            let val = 1.0;
            if (r < 0.5) val = Math.random() * 0.5 + 1.0; // 1.0 - 1.5
            else if (r < 0.8) val = Math.random() * 3.5 + 1.5; // 1.5 - 5.0
            else val = Math.random() * 15 + 5.0; // 5.0 - 20.0
            
            crashData.push(parseFloat(val.toFixed(2)));
            saveData();
            updateUI();
        }

        // 5. Machine Learning (TF.js)
        async function trainAI() {
            if (crashData.length < 20) {
                alert("Need at least 20 data points to train.");
                return;
            }

            const btn = document.getElementById('btn-train');
            const progress = document.getElementById('train-progress');
            const status = document.getElementById('model-status');
            
            btn.disabled = true;
            btn.textContent = "Training...";
            
            // Build simple model
            model = tf.sequential();
            model.add(tf.layers.dense({units: 8, activation: 'relu', inputShape: [WINDOW_SIZE]}));
            model.add(tf.layers.dense({units: 1, activation: 'sigmoid'}));
            model.compile({optimizer: 'adam', loss: 'binaryCrossentropy'});

            // Prepare Data (Predict if next is >= 2.0 based on last 5)
            const xs = [];
            const ys = [];
            for (let i = 0; i <= crashData.length - WINDOW_SIZE - 1; i++) {
                // Normalize by taking log to avoid huge numbers breaking the network
                const window = crashData.slice(i, i + WINDOW_SIZE).map(v => Math.log(v));
                xs.push(window);
                ys.push(crashData[i + WINDOW_SIZE] >= 2.0 ? 1 : 0);
            }

            const xsTensor = tf.tensor2d(xs);
            const ysTensor = tf.tensor2d(ys, [ys.length, 1]);

            // Train
            const epochs = 50;
            await model.fit(xsTensor, ysTensor, {
                epochs: epochs,
                callbacks: {
                    onEpochEnd: async (epoch, logs) => {
                        progress.style.width = `${((epoch + 1) / epochs) * 100}%`;
                        await tf.nextFrame();
                    }
                }
            });

            xsTensor.dispose();
            ysTensor.dispose();

            btn.disabled = false;
            btn.textContent = "Train AI";
            status.textContent = "Ready (Trained)";
            status.className = "text-green-400 font-bold";
            setTimeout(() => { progress.style.width = '0%'; }, 1000);
        }

        async function predict() {
            if (!model) {
                alert("Please Train the AI first!");
                return;
            }
            if (crashData.length < WINDOW_SIZE) {
                alert(`Need at least ${WINDOW_SIZE} recent crashes to predict.`);
                return;
            }

            // Get last 5 values, normalized the same way as training
            const recent = crashData.slice(-WINDOW_SIZE).map(v => Math.log(v));
            const inputTensor = tf.tensor2d([recent]);
            
            const prediction = model.predict(inputTensor);
            const prob = (await prediction.data())[0] * 100;
            
            inputTensor.dispose();
            prediction.dispose();

            // Update UI
            const signalText = document.getElementById('signal-text');
            const probText = document.getElementById('prob-text');
            
            probText.textContent = `${prob.toFixed(1)}% Chance`;

            if (prob >= 55) {
                signalText.textContent = "BET";
                signalText.className = "text-5xl font-black text-green-500";
            } else if (prob >= 45) {
                signalText.textContent = "WAIT";
                signalText.className = "text-5xl font-black text-yellow-500";
            } else {
                signalText.textContent = "SKIP";
                signalText.className = "text-5xl font-black text-red-500";
            }
        }
    </script>
</body>
</html>
